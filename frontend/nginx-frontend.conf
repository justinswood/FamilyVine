server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Allow large file uploads (photos, audio)
    client_max_body_size 155m;

    # Reverse proxy — API requests to backend container
    # ^~ ensures this prefix location wins over the static-asset regex below
    location ^~ /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Reverse proxy — uploaded files (photos, audio) from backend
    # ^~ ensures /uploads/*.jpg is proxied, not caught by the static-asset cache regex
    location ^~ /uploads/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy — health check endpoint
    location ^~ /health {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }

    # Handle React Router — serve SPA for all other routes
    # SECURITY: index.html must never be cached so auth redirects always work for new visitors
    # No-cache headers apply to ALL HTML responses (try_files fallback to index.html)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
